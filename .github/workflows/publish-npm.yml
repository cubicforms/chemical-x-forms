name: Publish to NPM and Version Bump
run-name: Publish ${{ github.event.inputs.version_type }} release to NPM and Version Bump
on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type (major, minor, patch)'
        required: true
        default: 'patch'
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calculate-next-version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          # Using semver.org compliant version incrementing
          if [ "${{ github.event.inputs.version_type }}" = "major" ]; then
            NEXT=$(echo $CURRENT | awk -F. '{print $1+1".0.0"}')
          elif [ "${{ github.event.inputs.version_type }}" = "minor" ]; then
            NEXT=$(echo $CURRENT | awk -F. '{print $1"."$2+1".0"}')
          else
            NEXT=$(echo $CURRENT | awk -F. '{print $1"."$2"."$3+1}')
          fi
          echo "next_version=$NEXT" >> $GITHUB_OUTPUT
          echo "WORKFLOW_TITLE=Publish ${{ github.event.inputs.version_type }} release to NPM (v. $NEXT)" >> $GITHUB_ENV

      - name: Update version
        run: echo "::notice title=Version::Publishing version ${{ steps.calculate-next-version.outputs.next_version }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org/'
          always-auth: true

      - name: Install dependencies
        # --frozen-lockfile aborts if pnpm-lock.yaml is stale, so the
        # published tarball is always built against the exact dep graph
        # the lockfile promises. Prevents a silent lockfile drift from
        # producing a mystery publish diff.
        run: pnpm install --frozen-lockfile

      - name: Validate Auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Stub @chemical-x/forms
        run: pnpm dev:prepare

      - name: Validate ESLint and Types
        # `pnpm check` already runs lint, format:check, typecheck, test,
        # size, bench, and coverage. A separate `pnpm test` step after
        # this duplicates work and slows the workflow.
        run: pnpm check

      # Import a GPG signing key so the version-bump commit + tag created
      # below by `pnpm version` are signed and show as "Verified" on GitHub.
      # Configures git user.name + user.email from the key's primary UID
      # (so the author identity matches the signature) and turns on
      # commit/tag autosigning. Requires repo secrets:
      #   - GPG_PRIVATE_KEY: ASCII-armored private key (gpg --armor --export-secret-keys KEYID)
      #   - GPG_PASSPHRASE:  the key's passphrase (omit if the key has none)
      # The key's matching public key must be uploaded to the GitHub account
      # whose email is in the key's UID, otherwise GitHub still marks the
      # commit "Unverified".
      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Bump version
        # `pnpm version` fires the `version` npm-hook script, which runs
        # `promote-changelog.mjs` + `generate-release-notes.mjs`. The
        # second script hits GitHub's `generate-notes` API via `gh`, so
        # the step needs GH_TOKEN — supplied from the workflow-scoped
        # GITHUB_TOKEN (read-only for repo content, sufficient for the
        # generate-notes endpoint).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${{ github.event.inputs.version_type }}" ]; then
            pnpm version patch
          else
            pnpm version ${{ github.event.inputs.version_type }}
          fi

      - name: Build
        run: pnpm prepack

      - name: Publish to npm
        # `--provenance` attaches an OIDC-signed statement linking the
        # published tarball to this workflow run + commit. The workflow
        # already declares `id-token: write`; npm's registry records
        # the statement so consumers can verify a tarball came from
        # this repo via `npm audit signatures`.
        run: pnpm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version bump
        if: success()
        run: git push --follow-tags

      # Create the GitHub Release for the just-pushed tag. Runs AFTER
      # npm publish + git push so a release on
      # https://github.com/<owner>/<repo>/releases always corresponds
      # to a published tarball and a remote tag. Best-effort: a failure
      # here (transient API, auth hiccup, quota) does NOT roll back the
      # publish — the user can re-run `gh release create` manually from
      # the tag if needed.
      #
      # Body shape: a metadata prelude (version, commit, author,
      # workflow run, npm link) plus GitHub's auto-generated
      # PR-grouped changelog (same API the `generate-release-notes.mjs`
      # hook script uses for RELEASES.md, so the two stay consistent).
      - name: Create GitHub Release
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.calculate-next-version.outputs.next_version }}"
          TAG="v$VERSION"

          # Metadata harvested from the version-bump commit at HEAD.
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_TITLE=$(git log -1 --pretty=%s HEAD)
          COMMIT_AUTHOR_NAME=$(git log -1 --pretty=%an HEAD)
          COMMIT_AUTHOR_EMAIL=$(git log -1 --pretty=%ae HEAD)
          COMMIT_DATE_ISO=$(git log -1 --pretty=%aI HEAD)
          SHORT_SHA="${COMMIT_SHA:0:12}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"

          # Auto-generated PR-grouped notes — follows `.github/release.yml`
          # if present, otherwise GitHub's default categorisation.
          AUTO_NOTES=$(gh api \
            --method POST \
            "/repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$TAG" \
            --jq .body)

          {
            echo "**Version** \`$VERSION\` • **Released** $COMMIT_DATE_ISO"
            echo ""
            echo "- Commit: [\`$SHORT_SHA\`]($REPO_URL/commit/$COMMIT_SHA) — $COMMIT_TITLE"
            echo "- Author: **$COMMIT_AUTHOR_NAME** <$COMMIT_AUTHOR_EMAIL>"
            echo "- Published via: [workflow run]($REPO_URL/actions/runs/${{ github.run_id }})"
            echo "- npm: [\`@chemical-x/forms@$VERSION\`](https://www.npmjs.com/package/@chemical-x/forms/v/$VERSION)"
            echo ""
            echo "---"
            echo ""
            echo "$AUTO_NOTES"
          } > "$RUNNER_TEMP/release-body.md"

          # `--verify-tag` confirms the tag exists on the remote before
          # creating the release, so a failed `git push --follow-tags`
          # above would short-circuit here rather than produce an
          # orphan release. `--latest` marks this as the primary
          # release on the repo's releases page — valid for patch /
          # minor / major bumps (the only modes this workflow accepts).
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$RUNNER_TEMP/release-body.md" \
            --verify-tag \
            --latest

      - name: Rollback version bump if failed
        if: failure()
        run: |
          echo "Rolling back version bump due to failure..."
          git reset --hard HEAD~1
