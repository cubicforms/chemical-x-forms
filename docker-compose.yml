services:
  cx:
    build: .
    container_name: attaform-dev
    # Use tini as PID 1 so detached background processes (e.g. the
    # prepack:watch dist-rebuild watcher started via `make link-attaform`
    # from attaform) get reaped properly instead of dying when their
    # parent shell exits.
    init: true
    volumes:
      # Mount source so edits on host reflect in container
      - .:/app
      # Anonymous volume preserves the container's node_modules (host's may differ)
      - /app/node_modules
      - /app/playground/node_modules
    ports:
      - '3001:3000' # playground dev server (3001 to avoid clashing with attaform frontend on 3000)
    environment:
      # pnpm needs HOME for its store
      HOME: /root
    # Long-running idle container; use `make shell` or `make dev` to interact
    command: ['sh', '-c', 'tail -f /dev/null']
