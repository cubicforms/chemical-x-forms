services:
  attaform:
    build: .
    container_name: attaform-dev
    # Use tini as PID 1 so detached background processes (e.g. the
    # prepack:watch dist-rebuild watcher started via `make link-attaform`
    # from attaform) get reaped properly instead of dying when their
    # parent shell exits.
    init: true
    volumes:
      # Mount source so edits on host reflect in container
      - .:/app
      # Anonymous volume preserves the container's node_modules (host's may differ)
      - /app/node_modules
      - /app/apps/site/node_modules
    ports:
      - '3000:3000' # docs site dev server
      # @nuxt/devtools 4.x's @vitejs/devtools serves its RPC websocket
      # on a separate port (default 7812). Without exposing it, the
      # devtools panel works degraded: in-page shortcut still toggles,
      # but server-side RPC features (component tree, store, etc.) fail
      # with "WebSocket connection to ws://localhost:7812 failed".
      - '7812:7812'
    environment:
      # pnpm needs HOME for its store
      HOME: /root
    # Long-running idle container; use `make up` (boots dev server) or `make shell` to interact
    command: ['sh', '-c', 'tail -f /dev/null']
